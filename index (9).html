<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web プロキシ</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  .card {
    background: #1e293b;
    padding: 2.5rem;
    border-radius: 16px;
    width: 90%;
    max-width: 480px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 1.4rem;
    margin-bottom: 0.5rem;
  }
  p.desc {
    color: #94a3b8;
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
  }
  form {
    display: flex;
    gap: 0.5rem;
  }
  input {
    flex: 1;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 1rem;
  }
  input:focus { outline: 2px solid #6366f1; }
  button {
    padding: 0.75rem 1.25rem;
    border-radius: 8px;
    border: none;
    background: #6366f1;
    color: white;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #4f46e5; }
  .note {
    margin-top: 1rem;
    font-size: 0.78rem;
    color: #64748b;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>🌐 Web プロキシ</h1>
    <p class="desc">閲覧したいサイトのURLを入力してください</p>
    <form onsubmit="go(event)">
      <input type="text" id="url" placeholder="example.com" autofocus>
      <button type="submit">開く</button>
    </form>
    <p class="note">個人利用を想定した簡易プロキシです。アクセス先サイトの利用規約は遵守してください。</p>
  </div>

  <script>
    function go(e) {
      e.preventDefault();
      let url = document.getElementById('url').value.trim();
      if (!url) return;
      if (!/^https?:\/\//i.test(url)) {
        url = 'https://' + url;
      }
      window.location.href = '/proxy/' + url;
    }
  </script>
</body>
</html>
